# Configuraciï¿½n del servidor
server.address=0.0.0.0
server.port=9090
server.servlet.context-path=/bdd_dto

# Configuraciï¿½n de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dbb_dto_poliza?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuraciï¿½n JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuraciï¿½n CORS
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=*
spring.mvc.cors.allowed-headers=*

# Activa el debug para ver logs detallados
debug=true

cors.max-age=3600

# Configuraciï¿½n de conexiones
server.tomcat.max-threads=200
server.tomcat.accept-count=100