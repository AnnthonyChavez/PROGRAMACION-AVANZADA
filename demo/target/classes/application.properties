# Configuraciï¿½n de la fuente de datos (DataSource)
spring.datasource.url=jdbc:mysql://localhost:3306/bd_hamburguesas?useSSL=false&serverTimezone=UTC

# Nombre de usuario para la conexiï¿½n a la base de datos.
spring.datasource.username=root

# Contraseï¿½a para la conexiï¿½n a la base de datos.
spring.datasource.password=

# Configuraciï¿½n de JPA (Java Persistence API) y Hibernate
spring.jpa.hibernate.ddl-auto=update

# Muestra las sentencias SQL generadas por Hibernate en la consola.
spring.jpa.show-sql=true

# Formatea las sentencias SQL mostradas en la consola para una mejor legibilidad.
spring.jpa.properties.hibernate.format_sql=true